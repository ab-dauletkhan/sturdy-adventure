app = 'sturdy-adventure'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  DJANGO_DEBUG = "False"
  DJANGO_ALLOWED_HOSTS = "sturdy-adventure.fly.dev,.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://sturdy-adventure.fly.dev,https://*.fly.dev"
  MEDIA_ROOT = "/code/media"
  SQLITE_DATABASE_PATH = "/code/media/db.sqlite3"
  SECURE_SSL_REDIRECT = "True"
  SESSION_COOKIE_SECURE = "True"
  CSRF_COOKIE_SECURE = "True"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[mounts]
  source = "media_data"
  destination = "/code/media"

[processes]
  app = "sh /code/scripts/start.sh"
